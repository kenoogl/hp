{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  {{ with .Params.publication_page }}
    <p class="meta"><a href="{{ . }}">Back to publication detail</a></p>
  {{ end }}
  {{ with .Params.bibtex_download }}
    <p><a class="download-button" href="{{ . }}" download>Download .bib</a></p>
  {{ end }}
  {{ with .Params.bibtex_source }}
    <section class="bibtex-source">
      <h2>BibTeX source</h2>
      <pre><code>{{ . }}</code></pre>
    </section>
  {{ end }}
</article>
{{ end }}
